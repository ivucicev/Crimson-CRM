services:
  app:
    build: .
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - SUDREG_CLIENT_ID=${SUDREG_CLIENT_ID}
      - SUDREG_CLIENT_SECRET=${SUDREG_CLIENT_SECRET}
      - SUDREG_BASE_URL=${SUDREG_BASE_URL:-https://sudreg-data.gov.hr/api/javni}
      - SUDREG_TOKEN_URL=${SUDREG_TOKEN_URL:-https://sudreg-data.gov.hr/api/oauth/token}
      - SUDREG_SYNC_PAGE_SIZE=${SUDREG_SYNC_PAGE_SIZE:-5000}
      - DATABASE_PATH=/app/data/crimson.db
    volumes:
      - ./data:/app/data
    restart: always
